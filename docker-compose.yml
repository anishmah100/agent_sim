services:
  eldoria:
    build: ./engine
    container_name: agent_sim_eldoria
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      BUNDLE: "/worlds/eldoria"
    volumes:
      - ./worlds:/worlds:ro
      - ./art:/art:ro
      - ./snapshots:/snapshots
  # Add more services to host additional worlds — each becomes its own
  # process per the "one server per world" rule in docs/VISION.md.
  # Example (commented):
  # rome:
  #   build: ./engine
  #   ports: ["8081:8080"]
  #   environment:
  #     BUNDLE: "/worlds/rome"
